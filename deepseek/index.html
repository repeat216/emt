<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>EMT Work - 主页</title>
    <link rel="icon" href="easm.ico" type="image/x-icon">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
            transition: background-color 0.35s cubic-bezier(0.4, 0, 0.2, 1),
                        color 0.35s cubic-bezier(0.4, 0, 0.2, 1),
                        border-color 0.35s cubic-bezier(0.4, 0, 0.2, 1),
                        box-shadow 0.35s cubic-bezier(0.4, 0, 0.2, 1),
                        transform 0.25s cubic-bezier(0.25, 1, 0.5, 1);
        }

        #themeOverlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 9999;
            opacity: 0;
            background: transparent;
            transition: none;
        }

        #themeOverlay.active {
            animation: diagonalReveal 0.8s ease-in-out forwards;
        }

        @keyframes diagonalReveal {
            0% {
                opacity: 1;
                clip-path: circle(0% at var(--x) var(--y));
                background: var(--overlay-bg);
            }
            100% {
                opacity: 1;
                clip-path: circle(150% at var(--x) var(--y));
                background: var(--overlay-bg);
            }
        }

        body {
            background: linear-gradient(135deg, #f8fafc 0%, #f1f5f9 100%);
            color: #1e293b;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow-x: hidden;
            scroll-behavior: smooth;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: radial-gradient(rgba(99, 102, 241, 0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
            z-index: -1;
        }

        .home-container {
            max-width: 1100px;
            width: 100%;
            margin: 0 auto;
            padding: 40px 24px;
            display: flex;
            flex-direction: column;
            gap: 40px;
            position: relative;
            z-index: 1;
        }

        .navbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 16px;
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 16px 32px;
            border-radius: 60px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.6);
        }

        @keyframes subtleGlow {
            0%, 100% { box-shadow: 0 8px 32px rgba(0, 0, 0, 0.04); }
            50% { box-shadow: 0 8px 40px rgba(99, 102, 241, 0.08); }
        }
        .navbar {
            animation: subtleGlow 4s ease-in-out infinite;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .brand img {
            width: 36px;
            height: 36px;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-4px); }
        }

        .brand span {
            font-size: 22px;
            font-weight: 700;
            background: linear-gradient(135deg, #4f46e5, #7c3aed);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .nav-links {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .nav-btn {
            padding: 10px 22px;
            border-radius: 999px;
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
            background: rgba(241, 245, 249, 0.6);
            color: #475569;
            border: 1px solid rgba(226, 232, 240, 0.5);
            transition: all 0.3s;
            display: inline-block;
            position: relative;
            overflow: hidden;
        }

        .nav-btn::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            background: rgba(99, 102, 241, 0.1);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            transition: width 0.4s, height 0.4s;
        }

        .nav-btn:hover::after {
            width: 300px;
            height: 300px;
        }

        .nav-btn:hover {
            background: rgba(99, 102, 241, 0.08);
            color: #6366f1;
            border-color: #6366f1;
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(99, 102, 241, 0.15);
        }

        .nav-btn.primary {
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: white;
            border: none;
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.2);
        }

        .nav-btn.primary:hover {
            background: linear-gradient(135deg, #5452e0, #7c3aed);
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(99, 102, 241, 0.35);
        }

        .theme-toggle-btn {
            width: 42px;
            height: 42px;
            font-size: 18px;
            cursor: pointer;
            border-radius: 50%;
            background: rgba(241, 245, 249, 0.6);
            border: 1px solid rgba(226, 232, 240, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-left: 8px;
            transition: all 0.3s;
        }

        .theme-toggle-btn:hover {
            background: rgba(226, 232, 240, 0.8);
            transform: scale(1.15) rotate(15deg);
        }

        .hero {
            text-align: center;
            padding: 60px 20px 40px;
            position: relative;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .hero h1 {
            font-size: 44px;
            font-weight: 800;
            background: linear-gradient(135deg, #4f46e5, #7c3aed);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 16px;
            animation: fadeInUp 0.8s ease-out;
        }

        .hero .subtitle {
            font-size: 24px;
            font-weight: 500;
            color: #64748b;
            margin-bottom: 24px;
            animation: fadeInUp 0.8s ease-out 0.1s both;
        }

        .hero .description {
            font-size: 16px;
            color: #475569;
            max-width: 700px;
            margin: 0 auto 32px;
            line-height: 1.8;
            animation: fadeInUp 0.8s ease-out 0.2s both;
        }

        .hero-buttons {
            display: flex;
            gap: 16px;
            justify-content: center;
            flex-wrap: wrap;
            animation: fadeInUp 0.8s ease-out 0.3s both;
        }

        .cta-btn {
            padding: 14px 36px;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.3s cubic-bezier(0.25, 1, 0.5, 1);
            border: none;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .cta-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left 0.5s;
        }

        .cta-btn:hover::before {
            left: 100%;
        }

        .cta-btn.primary-cta {
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: white;
            box-shadow: 0 8px 25px rgba(99, 102, 241, 0.25);
        }

        .cta-btn.primary-cta:hover {
            transform: translateY(-4px);
            box-shadow: 0 14px 35px rgba(99, 102, 241, 0.35);
        }

        .cta-btn.secondary-cta {
            background: rgba(241, 245, 249, 0.7);
            color: #475569;
            border: 1px solid rgba(226, 232, 240, 0.5);
        }

        .cta-btn.secondary-cta:hover {
            background: rgba(226, 232, 240, 0.8);
            transform: translateY(-4px);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.06);
        }

        .scroll-indicator {
            position: absolute;
            bottom: -60px;
            left: 50%;
            transform: translateX(-50%);
            animation: bounce 2s infinite;
            cursor: pointer;
            opacity: 0.6;
            transition: opacity 0.3s;
        }

        .scroll-indicator:hover {
            opacity: 1;
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% { transform: translateX(-50%) translateY(0); }
            40% { transform: translateX(-50%) translateY(-10px); }
            60% { transform: translateX(-50%) translateY(-5px); }
        }

        .scroll-indicator svg {
            width: 36px;
            height: 36px;
            stroke: #6366f1;
        }

        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 24px;
        }

        .feature-card {
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 36px 28px;
            border-radius: 24px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.6);
            text-align: center;
            transition: all 0.4s cubic-bezier(0.25, 1, 0.5, 1);
            position: relative;
        }

        .feature-card::before {
            content: '';
            position: absolute;
            inset: -1px;
            border-radius: 24px;
            padding: 1px;
            background: linear-gradient(135deg, transparent, rgba(99, 102, 241, 0.2), transparent);
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            opacity: 0;
            transition: opacity 0.4s;
        }

        .feature-card:hover::before {
            opacity: 1;
        }

        .feature-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 50px rgba(99, 102, 241, 0.12);
        }

        .feature-card h3 {
            font-size: 20px;
            font-weight: 700;
            color: #0f172a;
            margin-bottom: 12px;
        }

        .feature-card p {
            font-size: 14px;
            color: #64748b;
            margin-bottom: 20px;
        }

        .card-link {
            padding: 10px 24px;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: white;
            border-radius: 999px;
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
            display: inline-block;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }

        .card-link::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left 0.5s;
        }

        .card-link:hover::before {
            left: 100%;
        }

        .card-link:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(99, 102, 241, 0.3);
        }

        .update-section {
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 36px 32px;
            border-radius: 24px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.6);
            transition: all 0.3s;
        }

        .update-section:hover {
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.06);
        }

        .update-section h2 {
            font-size: 22px;
            font-weight: 700;
            background: linear-gradient(135deg, #f59e0b, #d97706);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 24px;
            display: inline-block;
            position: relative;
        }

        .update-section h2::after {
            content: '';
            position: absolute;
            bottom: -4px;
            left: 0;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, #f59e0b, transparent);
            border-radius: 2px;
        }

        .update-item {
            padding: 16px 0;
            border-bottom: 1px solid rgba(241, 245, 249, 0.6);
            transition: all 0.3s;
            cursor: default;
        }

        .update-item:hover {
            transform: translateX(8px);
            background: rgba(99, 102, 241, 0.02);
            padding-left: 8px;
            border-radius: 8px;
        }

        .update-item:last-child {
            border-bottom: none;
        }

        .update-title {
            font-size: 16px;
            font-weight: 600;
            color: #1e293b;
            margin-bottom: 6px;
        }

        .update-desc {
            font-size: 14px;
            color: #64748b;
        }

        body.dark {
            background: linear-gradient(135deg, #0f0f0f 0%, #1a1a1a 100%);
            color: #ffffff;
        }

        body.dark::before {
            background-image: radial-gradient(rgba(212, 175, 55, 0.04) 1px, transparent 1px);
        }

        body.dark .navbar,
        body.dark .feature-card,
        body.dark .update-section {
            background: rgba(20, 20, 20, 0.85);
            border-color: #333;
        }

        body.dark .brand span {
            background: linear-gradient(135deg, #d4af37, #f5c211);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        body.dark .nav-btn {
            background: #2a2a2a;
            color: #d4af37;
            border-color: #444;
        }

        body.dark .nav-btn:hover {
            background: #333;
            color: #f5c211;
        }

        body.dark .nav-btn.primary {
            background: linear-gradient(135deg, #d4af37, #f5c211);
            color: #111;
        }

        body.dark .theme-toggle-btn {
            background: #2a2a2a;
            color: #d4af37;
        }

        body.dark .hero h1 {
            background: linear-gradient(135deg, #d4af37, #f5c211);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        body.dark .hero .subtitle,
        body.dark .hero .description {
            color: #ddd;
        }

        body.dark .scroll-indicator svg {
            stroke: #d4af37;
        }

        body.dark .cta-btn.primary-cta {
            background: linear-gradient(135deg, #d4af37, #f5c211);
            color: #111;
        }

        body.dark .cta-btn.secondary-cta {
            background: #2a2a2a;
            color: #ddd;
            border-color: #444;
        }

        body.dark .feature-card::before {
            background: linear-gradient(135deg, transparent, rgba(212, 175, 55, 0.3), transparent);
        }

        body.dark .feature-card:hover {
            box-shadow: 0 20px 50px rgba(212, 175, 55, 0.15);
        }

        body.dark .feature-card h3,
        body.dark .update-title {
            color: #ffffff;
        }

        body.dark .feature-card p,
        body.dark .update-desc {
            color: #bbb;
        }

        body.dark .card-link {
            background: linear-gradient(135deg, #d4af37, #f5c211);
            color: #111;
        }

        body.dark .update-section h2 {
            background: linear-gradient(135deg, #fbbf24, #f59e0b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        body.dark .update-section h2::after {
            background: linear-gradient(90deg, #fbbf24, transparent);
        }
    </style>
</head>
<body>
    <div id="themeOverlay"></div>

    <div class="home-container">
        <nav class="navbar">
            <div class="brand">
                <img src="easm.ico" alt="EMT Work图标">
                <span>EMT Work</span>
            </div>
            <div class="nav-links">
                <a href="user.html" class="nav-btn">MINGW</a>
                <a href="user.html" class="nav-btn">McEliece加密</a>
                <a href="login.html" class="nav-btn primary" id="loginNavBtn">登录</a>
                <a href="register.html" class="nav-btn" id="registerNavBtn">注册</a>
                <a href="https://www.hgn.dpdns.org" target="_blank" class="nav-btn">合作商</a>
                <button class="theme-toggle-btn" id="themeToggle">☀️</button>
            </div>
        </nav>

        <section class="hero" id="heroSection">
            <h1>加密程序与编译工具下载</h1>
            <p class="subtitle">安全、高效、专业</p>
            <p class="description">
                我们致力于提供先进的加密解决方案和稳定的编译环境。
                无论是后量子加密还是经典的开发工具链，
                EMT Work 为您打造一站式技术资源平台。
            </p>
            <div class="hero-buttons">
                <a href="user.html" class="cta-btn primary-cta">立即下载</a>
                <a href="home.html" class="cta-btn secondary-cta">了解更多</a>
            </div>
            <div class="scroll-indicator" id="scrollIndicator" title="向下滚动了解更多">
                <svg viewBox="0 0 24 24" fill="none" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="6 9 12 15 18 9"></polyline>
                </svg>
            </div>
        </section>

        <section id="cardsSection">
            <div class="cards-grid">
                <div class="feature-card" id="loginCard">
                    <h3>登录/注册</h3>
                    <p id="loginCardDesc">当前支持账号数据存储云端</p>
                    <a href="login.html" class="card-link" id="loginCardBtn">前往登录</a>
                </div>
                <div class="feature-card">
                    <h3>前往首页</h3>
                    <p>前往首页</p>
                    <a href="home.html" class="card-link">前往首页</a>
                </div>
                <div class="feature-card">
                    <h3>工具下载</h3>
                    <p>当前支持MINGW和McEliece加密</p>
                    <a href="user.html" class="card-link">前往下载</a>
                </div>
            </div>
        </section>

        <section class="update-section">
            <h2>最近更新</h2>
            <div class="update-item">
                <div class="update-title">加密程序已经更新至v1.1.3</div>
                <div class="update-desc">当前可下载McEliece加密v1.1.3版本</div>
            </div>
            <div class="update-item">
                <div class="update-title">优化了网页性能</div>
                <div class="update-desc">网页更流畅了</div>
            </div>
            <div class="update-item">
                <div class="update-title">修复已知bug</div>
                <div class="update-desc">修复了登录后不显示</div>
            </div>
        </section>
    </div>

    <script>
        const themeBtn = document.getElementById('themeToggle');
        const overlay = document.getElementById('themeOverlay');

        function setTheme(isDark, animate = true, event = null) {
            if (animate && event) {
                const x = event.clientX;
                const y = event.clientY;
                const isCurrentlyDark = document.body.classList.contains('dark');
                
                overlay.style.setProperty('--x', x + 'px');
                overlay.style.setProperty('--y', y + 'px');
                
                if (isCurrentlyDark) {
                    overlay.style.setProperty('--overlay-bg', '#f8fafc');
                } else {
                    overlay.style.setProperty('--overlay-bg', '#121212');
                }
                
                overlay.classList.add('active');
                
                setTimeout(() => {
                    if (isDark) {
                        document.body.classList.add('dark');
                        themeBtn.textContent = '🌙';
                    } else {
                        document.body.classList.remove('dark');
                        themeBtn.textContent = '☀️';
                    }
                }, 350);
                
                setTimeout(() => {
                    overlay.classList.remove('active');
                }, 800);
            } else {
                if (isDark) {
                    document.body.classList.add('dark');
                    themeBtn.textContent = '🌙';
                } else {
                    document.body.classList.remove('dark');
                    themeBtn.textContent = '☀️';
                }
            }
        }

        const savedTheme = localStorage.getItem('theme');
        if (savedTheme === 'dark') {
            setTheme(true, false);
        } else {
            setTheme(false, false);
            if (!savedTheme) {
                localStorage.setItem('theme', 'light');
            }
        }

        themeBtn.addEventListener('click', (e) => {
            const isDark = !document.body.classList.contains('dark');
            setTheme(isDark, true, e);
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
        });

        // ========== 登录状态检测和按钮更新 ==========
        function updateLoginStatus() {
            const isLogin = localStorage.getItem('isLogin') === 'true';
            const username = localStorage.getItem('username');
            
            // 更新导航栏按钮
            const loginNavBtn = document.getElementById('loginNavBtn');
            const registerNavBtn = document.getElementById('registerNavBtn');
            
            if (isLogin && username) {
                loginNavBtn.textContent = username;
                loginNavBtn.href = 'home.html';
                registerNavBtn.style.display = 'none';
            }
            
            // 更新卡片区域
            const loginCardBtn = document.getElementById('loginCardBtn');
            const loginCardDesc = document.getElementById('loginCardDesc');
            
            if (isLogin && username) {
                loginCardBtn.textContent = '您已登录';
                loginCardBtn.href = 'home.html';
                loginCardDesc.textContent = '欢迎回来，' + username;
            }
        }
        
        // 页面加载时更新登录状态
        updateLoginStatus();

        const heroSection = document.getElementById('heroSection');
        const cardsSection = document.getElementById('cardsSection');
        const scrollIndicator = document.getElementById('scrollIndicator');
        let hasScrolled = false;

        window.addEventListener('wheel', (e) => {
            if (hasScrolled) return;
            const heroBottom = heroSection.getBoundingClientRect().bottom;
            const viewportHeight = window.innerHeight;
            if (e.deltaY > 0 && heroBottom < viewportHeight * 0.85) {
                hasScrolled = true;
                cardsSection.scrollIntoView({ behavior: 'smooth', block: 'start' });
                setTimeout(() => { hasScrolled = false; }, 2000);
            }
        }, { passive: true });

        scrollIndicator.addEventListener('click', () => {
            cardsSection.scrollIntoView({ behavior: 'smooth', block: 'start' });
        });

        let touchStartY = 0;
        window.addEventListener('touchstart', (e) => {
            touchStartY = e.touches[0].clientY;
        }, { passive: true });

        window.addEventListener('touchend', (e) => {
            if (hasScrolled) return;
            const touchEndY = e.changedTouches[0].clientY;
            const heroBottom = heroSection.getBoundingClientRect().bottom;
            const viewportHeight = window.innerHeight;
            if (touchStartY - touchEndY > 50 && heroBottom < viewportHeight * 0.85) {
                hasScrolled = true;
                cardsSection.scrollIntoView({ behavior: 'smooth', block: 'start' });
                setTimeout(() => { hasScrolled = false; }, 2000);
            }
        }, { passive: true });
    </script>
</body>
